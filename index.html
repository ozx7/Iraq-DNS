<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل IPTV الخاص بي</title>
    
    <!-- مكتبة CSS الخاصة بالمشغل -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- ثيم اختياري لجعله يبدو أجمل (City Theme) -->
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">

    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .video-container { width: 80%; max-width: 900px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>مشغل البث المباشر</h1>

    <div class="video-container">
        <video
            id="my-video"
            class="video-js vjs-big-play-centered vjs-theme-city"
            controls
            preload="auto"
            width="900"
            height="500"
            data-setup='{}'>
            <!-- ضع رابط البث الخاص بك هنا -->
            <source src="https://mn-nl.mncdn.com/utviraqi2/64c80359/index.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">
                للمشاهدة، يرجى تفعيل جافا سكريبت وتحديث المتصفح.
            </p>
        </video>
    </div>

    <!-- مكتبة الـ JavaScript -->
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
</body>
</html>
